import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* ============================================================
   FIREBASE CONFIG — kiddo-chores project
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD9iCH1BZXmE_ram7k9c5NpacSLHOEZ59c",

const firebaseApp = initializeApp(firebaseConfig);
const firestore = getFirestore(firebaseApp);
const storage = getStorage(firebaseApp);

// Single shared family doc — everyone with the URL reads/writes the same data.
// To run separate households later, change FAMILY_ID per deployment or read from URL.
const FAMILY_ID = "boyd";
const familyDocRef = doc(firestore, "families", FAMILY_ID);

// Enable offline persistence so the app works briefly without a connection.
// (Best-effort — fails silently if multiple tabs are open, which is fine.)
try { await enableIndexedDbPersistence(firestore); } catch (e) { /* multi-tab or unsupported */ }

/* ============================================================
   DATA LAYER — Firestore-backed
   - load(): one-shot read of the family doc
   - save(state): write the full doc
   - uploadImage(file): uploads to Cloud Storage, returns download URL
   - subscribe(cb): live updates from other family members' devices
   ============================================================ */
const db = {
  async load() {
    try {
      const snap = await getDoc(familyDocRef);
      return snap.exists() ? snap.data() : null;
    } catch (e) {
      console.error("Firestore load failed", e);
      return null;
    }
  },

  async save(state) {
    try {
      // Firestore rejects undefined values; strip them.
      const clean = JSON.parse(JSON.stringify(state));
      await setDoc(familyDocRef, clean);
    } catch (e) {
      console.error("Firestore save failed", e);
      throw e;
    }
  },

  async uploadImage(file) {
    // First resize client-side (same logic as before — keeps storage costs low)
    const resizedBlob = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const max = 600;
          const scale = Math.min(1, max / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          canvas.toBlob(b => b ? resolve(b) : reject(new Error("blob failed")), 'image/jpeg', 0.85);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // Upload to Cloud Storage under the family path
    const path = `families/${FAMILY_ID}/uploads/${Date.now()}_${Math.random().toString(36).slice(2,7)}.jpg`;
    const ref = storageRef(storage, path);
    await uploadBytes(ref, resizedBlob, { contentType: 'image/jpeg' });
    return await getDownloadURL(ref);
  },

  // Live sync — calls cb(state) whenever the family doc changes (any device).
  subscribe(cb) {
    return onSnapshot(familyDocRef, (snap) => {
      if (snap.exists() && !snap.metadata.hasPendingWrites) {
        cb(snap.data());
      }
    }, (err) => console.error("Firestore subscribe error", err));
  },
};

// Expose for debugging in the browser console
window.__db = db;

   ============================================================ */
const todayISO = () => new Date().toISOString().slice(0,10);
const nowISO   = () => new Date().toISOString();
const dayDelta = (rec) => rec === "daily" ? 1 : rec === "weekly" ? 7 : rec === "monthly" ? 30 : null;
const addDaysISO = (iso, d) => { const x = new Date(iso); x.setDate(x.getDate()+d); return x.toISOString().slice(0,10); };
const fmtDollars = (n) => `$${(n||0).toFixed(2)}`;
const fmtRelative = (iso) => {
  if (!iso) return "—";
  const t = todayISO();
  if (iso === t) return "Today";
  if (iso === addDaysISO(t,1)) return "Tomorrow";
  if (iso < t) return `Overdue (${iso})`;
  return iso;
};
const uid = (p) => p + "_" + Date.now() + "_" + Math.random().toString(36).slice(2,7);

// Debounced save — coalesces rapid state changes into one Firestore write.
// Also tracks status so we can show a tiny indicator if needed.
let saveTimer = null;
let saveStatus = "idle"; // "saving" | "saved" | "error" | "idle"
let suppressNextRemoteUpdate = false;

function scheduleSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveStatus = "saving";
  saveTimer = setTimeout(async () => {
    try {
      suppressNextRemoteUpdate = true;
      await db.save(state);
      saveStatus = "saved";
    } catch (e) {
      saveStatus = "error";
      showToast("Save failed", "Will retry on next change");
    }
  }, 600);
}

function setState(patch) {
  state = { ...state, ...patch };
  scheduleSave();
  render();
}
function setView(patch) {
  Object.assign(view, patch);
  render();
}

function pixelAvatarHTML(seed, color, bg, size = 56) {
  // deterministic 8x8 mirrored
  let s = (seed||0) * 9301 + 49297;
  const cells = [];
  for (let y = 0; y < 8; y++) {
    for (let x = 0; x < 4; x++) {
      s = (s * 9301 + 49297) % 233280;
      const on = (s / 233280) > 0.55;
      cells.push({ x, y, on });
      cells.push({ x: 7-x, y, on });
    }
  }
  const grid = Array.from({length:64}, (_,i) => {
    const x = i%8, y = Math.floor(i/8);
    const c = cells.find(c => c.x===x && c.y===y);
    return `<div style="background:${c?.on ? color : 'transparent'}"></div>`;
  }).join('');
  return `<div class="avatar-wrap" style="width:${size}px;height:${size}px;background:${bg};border-radius:${size/4}px;padding:${size/12}px;">
    <div class="pixel-avatar" style="width:100%;height:100%">${grid}</div>
  </div>`;
}

function avatarHTML(member, size = 44) {
  if (member.photoUrl) {
    return `<div class="avatar-wrap" style="width:${size}px;height:${size}px;border-radius:${size/4}px;background:${member.color}">
      <img class="avatar-photo" src="${escapeHtml(member.photoUrl)}" alt="${escapeHtml(member.name)}" style="border-radius:${size/4}px"/>
    </div>`;
  }
  return pixelAvatarHTML(member.avatar, member.color, "#0E2A47", size);
}

/* === confetti and toast === */
function fireConfetti() {
  const cols = ["#D4A93C", "#0A4F37", "#0A3091", "#9C2B2B", "#F5D478", "#1F6E8C"];
  const root = document.createElement('div');
  root.style.cssText = "position:fixed;left:50%;top:50%;pointer-events:none;z-index:100";
  document.body.appendChild(root);
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = "confetti-piece";
    p.style.background = cols[Math.floor(Math.random()*cols.length)];
    p.style.setProperty('--tx', `${(Math.random()-0.5)*400}px`);
    p.style.setProperty('--ty', `${-200 - Math.random()*200}px`);
    p.style.setProperty('--r', `${(Math.random()-0.5)*720}deg`);
    p.style.animationDelay = `${Math.random()*0.15}s`;
    root.appendChild(p);
  }
  setTimeout(() => root.remove(), 1800);
}

function showToast(msg, sub = "") {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  if (toastTimer) clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.id = 'toast';
  t.className = "toast slide-up";
  t.innerHTML = `<span style="color:#D4A93C">${ic.sparkles}</span>
    <div><div style="font-weight:700;font-size:14px">${escapeHtml(msg)}</div>
    ${sub ? `<div style="font-size:12px;opacity:0.8">${escapeHtml(sub)}</div>` : ''}</div>`;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 2800);
}

/* ============================================================
   ACTIONS
   ============================================================ */

function getActiveUser() {
  return state.members.find(m => m.id === state.activeUserId) || state.members[0];
}

function completeChore(choreId, attachedPhotoUrl = null) {
  const chore = state.chores.find(c => c.id === choreId);
  if (!chore) return;
  if (chore.photoRequired && !attachedPhotoUrl) {
    setView({ pendingPhotoChoreId: choreId });
    return;
  }
  const user = getActiveUser();
  const isBonus = state.bonusOfferedToday?.choreId === choreId;
  const mult = isBonus ? state.bonusOfferedToday.multiplier : 1;
  const earnedPts = chore.points * mult;
  const earnedDollars = chore.dollars * mult;

  // Kids always need approval; parents auto-approve their own
  const needsApproval = user.role === "kid" || chore.photoRequired;

  const completion = {
    id: uid("co"),
    choreId, by: user.id, when: nowISO(),
    photoUrl: attachedPhotoUrl,
    status: needsApproval ? "pending" : "approved",
    points: earnedPts, dollars: earnedDollars, bonus: isBonus,
  };

  let newChores = state.chores.map(c => {
    if (c.id !== choreId) return c;
    const dd = dayDelta(c.recurrence);
    return {
      ...c,
      status: completion.status === "approved" ? (dd ? "open" : "done") : "pending",
      nextDue: dd ? addDaysISO(todayISO(), dd) : c.nextDue,
    };
  });
  // bump room health a bit
  let newRooms = state.rooms.map(r =>
    r.id === chore.roomId ? { ...r, health: Math.min(1, r.health + 0.1) } : r
  );

  let newMembers = state.members;
  if (completion.status === "approved") {
    newMembers = state.members.map(m => m.id === user.id ? {
      ...m,
      pointsAllTime: m.pointsAllTime + earnedPts,
      allowance: m.allowance + earnedDollars,
      streak: (m.lastActive === todayISO() || m.lastActive === addDaysISO(todayISO(), -1)) ? m.streak + 1 : 1,
      lastActive: todayISO(),
    } : m);
  }

  setState({
    chores: newChores, rooms: newRooms, members: newMembers,
    completions: [completion, ...state.completions],
  });
  setView({ pendingPhotoChoreId: null });

  fireConfetti();
  if (completion.status === "approved") {
    showToast(`+${earnedPts} pts${earnedDollars ? ` · ${fmtDollars(earnedDollars)}` : ''}${isBonus ? ' · 2× BONUS!' : ''}`, chore.title);
  } else {
    showToast("Submitted for approval", chore.title);
  }
}

function approveCompletion(compId, approve) {
  const comp = state.completions.find(c => c.id === compId);
  if (!comp) return;
  const chore = state.chores.find(c => c.id === comp.choreId);
  const member = state.members.find(m => m.id === comp.by);

  let newCompletions = state.completions.map(c => c.id === compId ? { ...c, status: approve ? "approved" : "rejected" } : c);
  let newMembers = state.members;
  let newChores = state.chores;
  if (approve) {
    newMembers = state.members.map(m => m.id === comp.by ? {
      ...m,
      pointsAllTime: m.pointsAllTime + comp.points,
      allowance: m.allowance + comp.dollars,
      streak: (m.lastActive === todayISO() || m.lastActive === addDaysISO(todayISO(), -1)) ? m.streak + 1 : 1,
      lastActive: todayISO(),
    } : m);
    newChores = state.chores.map(c => {
      if (c.id !== comp.choreId) return c;
      const dd = dayDelta(c.recurrence);
      return { ...c, status: dd ? "open" : "done", nextDue: dd ? addDaysISO(todayISO(), dd) : c.nextDue };
    });
  } else {
    newChores = state.chores.map(c => c.id === comp.choreId ? { ...c, status: "open" } : c);
  }
  setState({ completions: newCompletions, members: newMembers, chores: newChores });
  if (approve) {
    fireConfetti();
    showToast(`Approved! ${member?.name} earned ${comp.points} pts`, chore?.title);
  } else {
    showToast("Sent back for redo", chore?.title);
  }
}

function redeemReward(rewardId) {
  const r = state.rewards.find(x => x.id === rewardId);
  if (!r) return;
  const user = getActiveUser();
  if (user.pointsAllTime < r.cost) { showToast("Not enough points yet"); return; }
  if (r.stock === 0) { showToast("Out of stock"); return; }

  const redemption = {
    id: uid("rd"), rewardId, by: user.id, when: nowISO(), status: "pending"
  };
  const newRewards = state.rewards.map(rr =>
    rr.id === rewardId && rr.stock > 0 ? { ...rr, stock: rr.stock - 1 } : rr
  );
  const newMembers = state.members.map(m =>
    m.id === user.id ? { ...m, pointsAllTime: m.pointsAllTime - r.cost } : m
  );
  setState({
    rewards: newRewards, members: newMembers,
    redemptions: [redemption, ...state.redemptions],
  });
  fireConfetti();
  showToast(`Redeemed: ${r.title}`, "Parent will fulfill soon");
  setView({ showRewardsShop: false });
}

function fulfillRedemption(redId, fulfilled) {
  const red = state.redemptions.find(r => r.id === redId);
  if (!red) return;
  const reward = state.rewards.find(rw => rw.id === red.rewardId);
  let newRedemptions = state.redemptions.map(r =>
    r.id === redId ? { ...r, status: fulfilled ? "fulfilled" : "denied" } : r
  );
  let newMembers = state.members;
  let newRewards = state.rewards;
  if (!fulfilled && reward) {
    // refund points and stock
    newMembers = state.members.map(m =>
      m.id === red.by ? { ...m, pointsAllTime: m.pointsAllTime + reward.cost } : m
    );
    newRewards = state.rewards.map(rr =>
      rr.id === reward.id && rr.stock >= 0 ? { ...rr, stock: rr.stock + 1 } : rr
    );
  }
  setState({ redemptions: newRedemptions, members: newMembers, rewards: newRewards });
  showToast(fulfilled ? "Marked fulfilled" : "Denied — points refunded");
}

function addChoreFromWizard(d) {
  const newChore = {
    id: uid("c"),
    title: d.title.trim() || "Untitled chore",
    roomId: d.roomId || state.rooms[0]?.id,
    assignee: d.assignee,
    points: +d.points || 0,
    dollars: +d.dollars || 0,
    recurrence: d.recurrence,
    photoRequired: !!d.photoRequired,
    status: "open",
    createdAt: nowISO(),
    nextDue: todayISO(),
  };
  setState({ chores: [newChore, ...state.chores] });
}

function recordPayout(kidId, amount, via) {
  setState({
    payouts: [{ id: uid("pay"), kidId, amount, when: nowISO(), paidVia: via }, ...state.payouts],
    members: state.members.map(m => m.id === kidId ? { ...m, allowance: Math.max(0, m.allowance - amount) } : m),
  });
  showToast(`${fmtDollars(amount)} marked paid via ${via}`);
}

function exportCSV() {
  const rows = [["When","Kid","Chore","Points","Dollars","Status"]];
  state.completions.forEach(co => {
    const chore = state.chores.find(c => c.id === co.choreId);
    const member = state.members.find(m => m.id === co.by);
    rows.push([co.when, member?.name || "?", chore?.title || "?", co.points, co.dollars.toFixed(2), co.status]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `boyd_chores_${todayISO()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

function buildHeroStats() {

        <div class="display-font" style="font-size:22px;font-weight:800;margin-top:8px">Nothing to review</div>
        <div style="opacity:0.7;margin-top:4px">Submitted chores and redemptions will appear here.</div>
      </div>`;
  }

  return `
    <div style="display:grid;gap:18px">
      ${pending.length ? `
        <div>
          <div class="mono-font" style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.6;font-weight:600;margin-bottom:8px">Chore approvals · ${pending.length}</div>
          <div style="display:grid;gap:10px">
            ${pending.map((co, i) => {
              const chore = state.chores.find(c => c.id === co.choreId);
              const member = state.members.find(m => m.id === co.by);
              return `
                <div class="card slide-up" style="padding:16px;display:flex;align-items:center;gap:12px;animation-delay:${i*0.04}s">
                  ${avatarHTML(member, 44)}
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:700">${escapeHtml(chore?.title || '?')}</div>
                    <div style="font-size:12px;opacity:0.7">${escapeHtml(member?.name || '')} · ${new Date(co.when).toLocaleString()}${co.photoUrl ? ' · 📸 photo' : ''}</div>
                  </div>
                  ${co.photoUrl ? `<img src="${escapeHtml(co.photoUrl)}" alt="proof" style="width:44px;height:44px;border-radius:8px;object-fit:cover;cursor:pointer" data-action="view-photo" data-photo="${escapeHtml(co.photoUrl)}"/>` : ''}
                  <div style="text-align:right">
                    <div class="display-font" style="font-weight:800">+${co.points}</div>
                    ${co.dollars > 0 ? `<div class="mono-font" style="font-size:11px;color:#0A4F37">${fmtDollars(co.dollars)}</div>` : ''}
                  </div>
                  <div style="display:flex;gap:6px">
                    <button data-action="reject-completion" data-id="${co.id}" style="width:36px;height:36px;border-radius:8px;border:1px solid #9C2B2B;background:white;color:#9C2B2B;cursor:pointer;display:flex;align-items:center;justify-content:center">${ic.x}</button>
                    <button data-action="approve-completion" data-id="${co.id}" style="width:36px;height:36px;border-radius:8px;border:none;background:#0A4F37;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center">${ic.check}</button>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      ` : ''}

      ${pendingRedemptions.length ? `
        <div>
          <div class="mono-font" style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.6;font-weight:600;margin-bottom:8px">Store redemptions · ${pendingRedemptions.length}</div>
          <div style="display:grid;gap:10px">
            ${pendingRedemptions.map((red, i) => {
              const reward = state.rewards.find(r => r.id === red.rewardId);
              const member = state.members.find(m => m.id === red.by);
              return `
                <div class="card slide-up" style="padding:16px;display:flex;align-items:center;gap:12px;animation-delay:${i*0.04}s">
                  ${avatarHTML(member, 44)}
                  <div style="flex:1;min-width:0">
                    <div style="font-weight:700">${escapeHtml(reward?.title || '?')} ${reward?.emoji || ''}</div>
                    <div style="font-size:12px;opacity:0.7">${escapeHtml(member?.name || '')} · redeemed ${new Date(red.when).toLocaleString()}</div>
                  </div>
                  <div style="display:flex;gap:6px">
                    <button data-action="deny-redemption" data-id="${red.id}" style="width:36px;height:36px;border-radius:8px;border:1px solid #9C2B2B;background:white;color:#9C2B2B;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Deny &amp; refund points">${ic.x}</button>
                    <button data-action="fulfill-redemption" data-id="${red.id}" style="width:36px;height:36px;border-radius:8px;border:none;background:#0A4F37;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Mark fulfilled">${ic.check}</button>
                  </div>
                </div>`;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>`;
}

/* === LEDGER VIEW === */
function buildLedgerView() {
  const recent = state.completions.slice(0, 30);
  return `
    <div style="display:grid;gap:16px">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" data-action="export-csv">${ic.download} Export CSV</button>
        <button class="btn btn-gold" data-action="open-payout">${ic.dollar} Payout / Greenlight</button>
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <div style="padding:14px 18px;border-bottom:1px solid rgba(14,42,71,0.08);display:flex;align-items:center;gap:8px">
          ${ic.trending}
          <div class="display-font" style="font-size:18px;font-weight:800">Completion ledger</div>
        </div>
        ${recent.length === 0 ? `
          <div style="padding:24px;opacity:0.6;font-size:14px">No completions yet — once chores get done, they'll show up here.</div>
        ` : `
          <div>${recent.map(co => {
            const chore = state.chores.find(c => c.id === co.choreId);
            const member = state.members.find(m => m.id === co.by);
            return `
              <div style="padding:10px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(14,42,71,0.04);font-size:13px">
                <div style="flex:1">
                  <span style="font-weight:600">${escapeHtml(member?.name || '?')}</span>
                  <span style="opacity:0.7">completed</span>
                  <span>${escapeHtml(chore?.title || '?')}</span>
                  ${co.bonus ? '<span style="margin-left:6px;font-size:10px;color:#D4A93C;font-weight:700">BONUS</span>' : ''}
                </div>
                <div class="mono-font" style="font-size:11px;opacity:0.5">${new Date(co.when).toLocaleDateString()}</div>
                <div style="min-width:60px;text-align:right">
                  <div style="font-weight:700">+${co.points}p</div>
                  ${co.dollars > 0 ? `<div class="mono-font" style="font-size:10px;color:#0A4F37">${fmtDollars(co.dollars)}</div>` : ''}

                <span class="badge ${co.status === 'approved' ? 'badge-green' : co.status === 'pending' ? 'badge-yellow' : 'badge-red'}">${co.status}</span>

        `}
      </div>

}

/* ============================================================
   MODALS
   ============================================================ */

function buildModal() {
  if (view.pendingPhotoChoreId) return photoModalHTML();
  if (view.showAdd) return wizardModalHTML();
  if (view.editingChoreId) return choreFormModalHTML();
  if (view.showRewardsShop) return rewardsShopModalHTML();
  if (view.showAddReward || view.editingRewardId) return rewardFormModalHTML();
  if (view.showPayout) return payoutModalHTML();
  if (view.showSettings) return settingsModalHTML();
  if (view.showProfile) return profileModalHTML();
  return '';
}

function modalShell(content) {
  return `<div class="modal-backdrop">
    <div class="modal-body">
      <button class="modal-close" data-action="close-modal">${ic.x}</button>
      ${content}
    </div>
  </div>`;
}

function photoModalHTML() {
  const chore = state.chores.find(c => c.id === view.pendingPhotoChoreId);
  if (!chore) return '';
  return modalShell(`
    <div style="text-align:center">
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:6px">Snap proof</div>
      <div style="opacity:0.7;font-size:14px;margin-bottom:16px">${escapeHtml(chore.title)}</div>
      <label class="upload-area" style="display:block">
        <span style="color:#D4A93C">${ic.camera}</span>
        <div style="font-weight:600;margin-top:8px">Take or upload a photo</div>
        <div style="font-size:12px;opacity:0.6;margin-top:4px">A parent will approve before points pay out.</div>
        <input type="file" accept="image/*" capture="environment" style="display:none" data-action="upload-chore-photo" data-chore-id="${chore.id}"/>
      </label>
    </div>
  `);
}

function wizardModalHTML() {
  // initialize draft on first open
  if (!view.wizardDraft) {
    view.wizardDraft = {
      title: "",
      roomId: state.rooms[0]?.id || null,
      assignee: view.wizardLastAssignee || null,
      points: 1,
      dollars: 0,
      recurrence: view.wizardLastRecurrence,
      photoRequired: false,
    };
    view.wizardStep = 0;
  }
  const d = view.wizardDraft;
  const step = view.wizardStep;
  const kids = state.members.filter(m => m.role === "kid");
  const totalSteps = 5;

  // Progress dots
  const dots = Array.from({length: totalSteps}).map((_, i) => `
    <div style="flex:1;height:4px;border-radius:2px;background:${i <= step ? '#D4A93C' : 'rgba(14,42,71,0.1)'};transition:background 0.3s"></div>
  `).join('');

  let body = "";

  // STEP 0: Title — with library suggestions
  if (step === 0) {
    // Group library by room
    const byRoom = {};
    CHORE_LIBRARY.forEach(c => {
      if (!byRoom[c.room]) byRoom[c.room] = [];
      byRoom[c.room].push(c);
    });
    body = `
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:4px">What's the chore?</div>
      <div style="opacity:0.65;font-size:13px;margin-bottom:14px">Tap a suggestion below, or type your own.</div>

      <input class="input-base" id="wizard-title" placeholder="Type a chore name…" value="${escapeHtml(d.title)}" data-action="wizard-title-input" autocomplete="off" style="margin-bottom:14px;font-size:16px"/>

      <div style="margin-bottom:8px">
        <div class="mono-font" style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.5;font-weight:600">Common chores · tap to use</div>
      </div>
      <div style="max-height:340px;overflow-y:auto;display:grid;gap:14px;padding-bottom:8px">
        ${Object.entries(byRoom).map(([roomName, items]) => {
          const room = state.rooms.find(r => r.name === roomName);
          return `
            <div>
              <div style="font-size:11px;opacity:0.6;margin-bottom:6px;font-weight:600">${room?.emoji || ''} ${escapeHtml(roomName)}</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px">
                ${items.map(c => `
                  <button data-action="wizard-pick-library" data-title="${escapeHtml(c.title)}" data-room="${escapeHtml(c.room)}" data-points="${c.points}" data-dollars="${c.dollars}" data-recurrence="${c.recurrence}" data-photo="${c.photo}" style="background:white;border:1px solid rgba(14,42,71,0.15);border-radius:100px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;color:#0E2A47;transition:all 0.15s">
                    ${escapeHtml(c.title)}
                    <span style="opacity:0.5;font-size:11px;margin-left:4px">+${c.points}p${c.dollars ? ` · $${c.dollars.toFixed(2)}` : ''}</span>
                  </button>
                `).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // STEP 1: Who
  if (step === 1) {
    body = `
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:4px">Who's doing it?</div>
      <div style="opacity:0.65;font-size:13px;margin-bottom:18px">${escapeHtml(d.title)}</div>
      <div style="display:grid;gap:8px">
        ${kids.map(k => `
          <button data-action="wizard-set-assignee" data-id="${k.id}" style="display:flex;align-items:center;gap:12px;padding:12px;background:${d.assignee===k.id ? '#0E2A47' : 'white'};color:${d.assignee===k.id ? '#F7F4ED' : '#0E2A47'};border:2px solid ${d.assignee===k.id ? '#D4A93C' : 'rgba(14,42,71,0.1)'};border-radius:12px;cursor:pointer;font-family:inherit;text-align:left;width:100%">
            ${avatarHTML(k, 44)}
            <div style="flex:1">
              <div style="font-weight:700;font-size:15px">${escapeHtml(k.name)}</div>
              <div style="font-size:11px;opacity:0.65">${k.pointsAllTime} pts · ${fmtDollars(k.allowance)} owed</div>
            </div>
            ${d.assignee===k.id ? `<span style="color:#D4A93C">${ic.check}</span>` : ''}
          </button>
        `).join('')}
        <button data-action="wizard-set-assignee" data-id="" style="display:flex;align-items:center;gap:12px;padding:12px;background:${d.assignee===null ? '#0E2A47' : 'white'};color:${d.assignee===null ? '#F7F4ED' : '#0E2A47'};border:2px solid ${d.assignee===null ? '#D4A93C' : 'rgba(14,42,71,0.1)'};border-radius:12px;cursor:pointer;font-family:inherit;text-align:left">
          <div style="width:44px;height:44px;border-radius:11px;background:rgba(14,42,71,0.05);display:flex;align-items:center;justify-content:center;font-size:20px">🌟</div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:15px">Anyone</div>
            <div style="font-size:11px;opacity:0.65">First kid to claim it gets the points</div>
          </div>
        </button>
      </div>
    `;
  }

  // STEP 2: When (recurrence) + Room
  if (step === 2) {
    const opts = [
      { id: "daily",   label: "Daily",    sub: "Every day", emoji: "📅" },
      { id: "weekly",  label: "Weekly",   sub: "Once a week", emoji: "🗓️" },
      { id: "monthly", label: "Monthly",  sub: "Once a month", emoji: "📆" },
      { id: "once",    label: "One time", sub: "Just this once", emoji: "✨" },
    ];
    body = `
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:4px">How often?</div>
      <div style="opacity:0.65;font-size:13px;margin-bottom:18px">${escapeHtml(d.title)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">
        ${opts.map(o => `
          <button data-action="wizard-set-recurrence" data-id="${o.id}" style="padding:14px;background:${d.recurrence===o.id ? '#0E2A47' : 'white'};color:${d.recurrence===o.id ? '#F7F4ED' : '#0E2A47'};border:2px solid ${d.recurrence===o.id ? '#D4A93C' : 'rgba(14,42,71,0.1)'};border-radius:12px;cursor:pointer;font-family:inherit;text-align:left">
            <div style="font-size:24px;margin-bottom:4px">${o.emoji}</div>
            <div style="font-weight:700;font-size:14px">${o.label}</div>
            <div style="font-size:11px;opacity:0.65">${o.sub}</div>
          </button>
        `).join('')}
      </div>

      <label class="field-label">Which room?</label>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${state.rooms.map(r => `
          <button data-action="wizard-set-room" data-id="${r.id}" style="background:${d.roomId===r.id ? '#0E2A47' : 'white'};color:${d.roomId===r.id ? '#F7F4ED' : '#0E2A47'};border:1px solid ${d.roomId===r.id ? '#D4A93C' : 'rgba(14,42,71,0.15)'};border-radius:100px;padding:8px 14px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600">
            ${r.emoji} ${escapeHtml(r.name)}
          </button>
        `).join('')}
      </div>
    `;
  }

  // STEP 3: Points & Dollars
  if (step === 3) {
    const pointPresets = [1, 2, 3, 5, 10];
    const dollarPresets = [0, 0.50, 1, 2, 5];
    body = `
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:4px">What's it worth?</div>
      <div style="opacity:0.65;font-size:13px;margin-bottom:18px">${escapeHtml(d.title)}</div>

      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
          <label class="field-label" style="margin:0">Points</label>
          <div class="display-font" style="font-size:32px;font-weight:800;color:#D4A93C">${d.points}</div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          ${pointPresets.map(p => `
            <button data-action="wizard-set-points" data-value="${p}" style="flex:1;padding:10px;background:${d.points===p ? '#D4A93C' : 'white'};color:${d.points===p ? '#0E2A47' : '#0E2A47'};border:1px solid ${d.points===p ? '#D4A93C' : 'rgba(14,42,71,0.15)'};border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:14px">${p}</button>
          `).join('')}
        </div>
        <input class="input-base" type="number" min="0" max="100" value="${d.points}" data-action="wizard-points-input" placeholder="Custom points" style="font-size:14px"/>
      </div>

      <div style="margin-bottom:18px">
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px">
          <label class="field-label" style="margin:0">Cash payout (optional)</label>
          <div class="display-font" style="font-size:32px;font-weight:800;color:#0A4F37">${fmtDollars(d.dollars)}</div>
        </div>
        <div style="display:flex;gap:6px;margin-bottom:8px">
          ${dollarPresets.map(v => `
            <button data-action="wizard-set-dollars" data-value="${v}" style="flex:1;padding:10px;background:${d.dollars===v ? '#0A4F37' : 'white'};color:${d.dollars===v ? '#F7F4ED' : '#0E2A47'};border:1px solid ${d.dollars===v ? '#0A4F37' : 'rgba(14,42,71,0.15)'};border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px">${v === 0 ? '$0' : '$' + v.toFixed(v < 1 ? 2 : 0)}</button>
          `).join('')}
        </div>
        <input class="input-base" type="number" min="0" step="0.25" value="${d.dollars}" data-action="wizard-dollars-input" placeholder="Custom amount" style="font-size:14px"/>
      </div>

      <button data-action="wizard-toggle-photo" style="display:flex;align-items:center;gap:10px;padding:12px;background:${d.photoRequired ? 'rgba(212,169,60,0.1)' : 'white'};border:2px solid ${d.photoRequired ? '#D4A93C' : 'rgba(14,42,71,0.1)'};border-radius:12px;cursor:pointer;font-family:inherit;width:100%;text-align:left;color:#0E2A47">
        <div style="width:24px;height:24px;border-radius:6px;background:${d.photoRequired ? '#D4A93C' : 'rgba(14,42,71,0.05)'};color:${d.photoRequired ? '#0E2A47' : '#0E2A47'};display:flex;align-items:center;justify-content:center">${d.photoRequired ? ic.check : ic.camera}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">Require photo proof</div>
          <div style="font-size:11px;opacity:0.65">Kid attaches a photo; you approve before points pay out</div>
        </div>
      </button>
    `;
  }

  // STEP 4: Confirm
  if (step === 4) {
    const room = state.rooms.find(r => r.id === d.roomId);
    const assignee = state.members.find(m => m.id === d.assignee);
    body = `
      <div class="display-font" style="font-size:24px;font-weight:800;margin-bottom:4px">Look right?</div>
      <div style="opacity:0.65;font-size:13px;margin-bottom:18px">Add this chore to the family list.</div>
      <div style="background:white;border-radius:14px;padding:18px;border:2px solid #D4A93C">
        <div style="font-weight:800;font-size:18px;margin-bottom:8px">${escapeHtml(d.title)}</div>
        <div style="display:grid;gap:10px;font-size:13px">
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">Who</span><span style="font-weight:600">${assignee ? escapeHtml(assignee.name) : '🌟 Anyone'}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">Room</span><span style="font-weight:600">${room?.emoji || ''} ${escapeHtml(room?.name || '')}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">How often</span><span style="font-weight:600">${d.recurrence}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">Points</span><span style="font-weight:700;color:#D4A93C">${d.points}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">Cash</span><span style="font-weight:700;color:#0A4F37">${fmtDollars(d.dollars)}</span></div>
          <div style="display:flex;justify-content:space-between"><span style="opacity:0.6">Photo proof</span><span style="font-weight:600">${d.photoRequired ? 'Required' : 'No'}</span></div>
        </div>
      </div>
      ${view.wizardJustAddedCount > 0 ? `
        <div style="margin-top:14px;padding:10px 14px;background:rgba(10,79,55,0.08);border-radius:10px;font-size:12px;color:#0A4F37;display:flex;align-items:center;gap:8px">
          <span>${ic.check}</span> Already added ${view.wizardJustAddedCount} chore${view.wizardJustAddedCount > 1 ? 's' : ''} this session
        </div>
      ` : ''}
    `;
  }

  // Navigation
  // For step 0, check the live input value too in case input event hasn't synced yet
  const liveTitle = step === 0 ? (document.getElementById('wizard-title')?.value || d.title) : d.title;
  const canAdvance = (step === 0 ? liveTitle.trim().length > 0 :
                      step === 1 ? d.assignee !== undefined :
                      step === 2 ? d.recurrence && d.roomId :
                      step === 3 ? d.points >= 0 : true);

  return modalShell(`
    <div style="display:flex;gap:4px;margin-bottom:18px">${dots}</div>
    ${body}
    <div style="display:flex;gap:8px;margin-top:20px;justify-content:space-between;align-items:center">
      ${step > 0 ? `<button class="btn btn-ghost" data-action="wizard-back">← Back</button>` : `<button class="btn btn-ghost" data-action="wizard-cancel">Cancel</button>`}
      ${step < totalSteps - 1
        ? `<button class="btn btn-primary" data-action="wizard-next" ${!canAdvance ? 'disabled' : ''}>Next →</button>`
        : `<div style="display:flex;gap:6px"><button class="btn btn-ghost" data-action="wizard-add-and-continue">Add &amp; new</button><button class="btn btn-gold" data-action="wizard-add-and-finish">${ic.check} Add chore</button></div>`
      }
    </div>
  `);
}


function choreFormModalHTML() {
  const editing = view.editingChoreId ? state.chores.find(c => c.id === view.editingChoreId) : null;
  const f = editing || { title: "", roomId: state.rooms[0]?.id, assignee: null, points: 1, dollars: 0, recurrence: "weekly", photoRequired: false };

function render() {
  const user = getActiveUser();
  const isParent = user.role === "parent";
  const kidModeOn = state.kidMode && !isParent;

  let mainHTML = "";
  if (view.tab === "today")  mainHTML = buildTodayView();
  if (view.tab === "store")  mainHTML = buildStoreView();
  if (view.tab === "house")  mainHTML = buildHouseView();
  if (view.tab === "crew")   mainHTML = buildCrewView();
  if (view.tab === "review" && isParent) mainHTML = buildReviewView();
  if (view.tab === "ledger" && isParent) mainHTML = buildLedgerView();

  document.getElementById('app').className = kidModeOn ? "kid-mode" : "";
  document.getElementById('app').style.minHeight = "100vh";
  document.getElementById('app').innerHTML = `
    ${buildHeader()}
    ${buildHeroStats()}
    ${buildTabs()}
    <main style="padding:12px 24px 100px;max-width:1100px;margin:0 auto">${mainHTML}</main>
    ${isParent && view.tab !== "store" ? `<button class="fab" data-action="open-add-chore" aria-label="Add chore">${ic.plus}</button>` : ''}
    ${isParent && view.tab === "store" ? `<button class="fab" data-action="add-reward" aria-label="Add reward">${ic.plus}</button>` : ''}
    <footer class="mono-font" style="text-align:center;padding:40px 24px;opacity:0.5;font-size:11px;letter-spacing:0.1em;text-transform:uppercase">Boyd Family Operations · v1.0</footer>
    ${buildModal()}
  `;
}

/* ============================================================
   EVENT DELEGATION — single listener for everything
   ============================================================ */

document.addEventListener('click', async (e) => {
  // close user menu when clicking outside
  if (view.userMenuOpen && !e.target.closest('[data-action="toggle-user-menu"]') && !e.target.closest('[data-action="switch-user"]') && !e.target.closest('[data-action="toggle-kid-mode"]') && !e.target.closest('[data-action="open-profile"]')) {
    view.userMenuOpen = false;
    render();
    return;
  }

  // Modal backdrop close: only when clicking the backdrop element itself,
  // not when a click bubbles up from inside the modal body.
  if (e.target.classList && e.target.classList.contains('modal-backdrop')) {
    view.wizardDraft = null;
    view.wizardJustAddedCount = 0;
    setView({ showAdd: false, editingChoreId: null, showRewardsShop: false, showPayout: false, showSettings: false, showProfile: null, showAddReward: false, editingRewardId: null, pendingPhotoChoreId: null });
    return;
  }

  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  switch (action) {
    case "toggle-user-menu":
      e.stopPropagation();
      setView({ userMenuOpen: !view.userMenuOpen });
      break;
    case "switch-user":
      setState({ activeUserId: target.dataset.userId });
      setView({ userMenuOpen: false });
      break;
    case "toggle-kid-mode":
      // handled by change event; do nothing on click
      break;
    case "set-tab":
      setView({ tab: target.dataset.tab, userMenuOpen: false, roomFilter: null });
      break;
    case "set-settings-tab":
      setView({ settingsTab: target.dataset.tab });
      break;
    case "set-reward-filter":
      setView({ rewardCategoryFilter: target.dataset.filter });
      break;
    case "filter-by-room":
      setView({ tab: "today", roomFilter: target.dataset.roomId });
      break;
    case "clear-room-filter":
      setView({ roomFilter: null });
      break;
    case "complete-chore":
      completeChore(target.dataset.choreId);
      break;
    case "edit-chore":
      e.stopPropagation();
      setView({ editingChoreId: target.dataset.choreId });
      break;
    case "delete-chore": {
      const id = target.dataset.choreId;
      const chore = state.chores.find(c => c.id === id);
      if (!chore) {
        showToast("Couldn't find that chore");
        break;
      }
      if (view.confirmingDeleteChoreId === id) {
        view.editingChoreId = null;
        view.confirmingDeleteChoreId = null;
        setState({ chores: state.chores.filter(c => c.id !== id) });
        showToast("Chore deleted", chore.title);
      } else {
        view.confirmingDeleteChoreId = id;
        setView({});
        setTimeout(() => {
          if (view.confirmingDeleteChoreId === id) {
            view.confirmingDeleteChoreId = null;
            render();
          }
        }, 4000);
      }
      break;
    }
    case "open-add-chore":
      view.wizardDraft = null; // forces re-init in wizardModalHTML
      view.wizardStep = 0;
      view.wizardJustAddedCount = 0;
      setView({ showAdd: true });
      break;

    /* === WIZARD === */
    case "wizard-cancel":
      view.wizardDraft = null;
      view.wizardJustAddedCount = 0;
      setView({ showAdd: false });
      break;
    case "wizard-back":
      setView({ wizardStep: Math.max(0, view.wizardStep - 1) });
      break;
    case "wizard-next": {
      // Sync any open input fields to draft before advancing
      const titleInput = document.getElementById('wizard-title');
      if (titleInput && view.wizardDraft) view.wizardDraft.title = titleInput.value;
      setView({ wizardStep: Math.min(4, view.wizardStep + 1) });
      break;
    }
    case "wizard-pick-library": {
      const t = target.dataset;
      const room = state.rooms.find(r => r.name === t.room);
      view.wizardDraft = {
        ...view.wizardDraft,
        title: t.title,
        roomId: room?.id || view.wizardDraft.roomId,
        points: +t.points,
        dollars: +t.dollars,
        recurrence: t.recurrence,
        photoRequired: t.photo === "true",
      };
      // Skip ahead to "who" — they tapped a complete preset
      setView({ wizardStep: 1 });
      break;
    }
    case "wizard-title-input":
      view.wizardDraft.title = target.value;
      // don't re-render on every keystroke
      break;
    case "wizard-set-assignee":
      view.wizardDraft.assignee = target.dataset.id || null;
      view.wizardLastAssignee = view.wizardDraft.assignee;
      setView({ wizardStep: 2 });
      break;
    case "wizard-set-recurrence":
      view.wizardDraft.recurrence = target.dataset.id;
      view.wizardLastRecurrence = target.dataset.id;
      setView({}); // re-render to show selection
      break;
    case "wizard-set-room":
      view.wizardDraft.roomId = target.dataset.id;
      setView({});
      break;
    case "wizard-set-points":
      view.wizardDraft.points = +target.dataset.value;
      setView({});
      break;
    case "wizard-set-dollars":
      view.wizardDraft.dollars = +target.dataset.value;
      setView({});
      break;
    case "wizard-points-input":
      view.wizardDraft.points = +target.value || 0;
      break;
    case "wizard-dollars-input":
      view.wizardDraft.dollars = +target.value || 0;
      break;
    case "wizard-toggle-photo":
      view.wizardDraft.photoRequired = !view.wizardDraft.photoRequired;
      setView({});
      break;
    case "wizard-add-and-continue": {
      const d = view.wizardDraft;
      // Pick up any unsynced title from the input field
      const titleInput = document.getElementById('wizard-title');
      if (titleInput && titleInput.value) d.title = titleInput.value;
      addChoreFromWizard(d);
      view.wizardJustAddedCount += 1;
      // Reset draft but keep last-used kid + recurrence for fast multi-add
      view.wizardDraft = {
        title: "",
        roomId: state.rooms[0]?.id || null,
        assignee: view.wizardLastAssignee,
        points: 1,
        dollars: 0,
        recurrence: view.wizardLastRecurrence,
        photoRequired: false,
      };
      setView({ wizardStep: 0 });
      break;
    }
    case "wizard-add-and-finish": {
      const d = view.wizardDraft;
      const titleInput = document.getElementById('wizard-title');
      if (titleInput && titleInput.value) d.title = titleInput.value;
      addChoreFromWizard(d);
      view.wizardJustAddedCount += 1;
      const count = view.wizardJustAddedCount;
      view.wizardDraft = null;
      view.wizardJustAddedCount = 0;
      setView({ showAdd: false });
      showToast(`Added ${count} chore${count > 1 ? 's' : ''}`, "Find them in Today");
      break;
    }
    /* === END WIZARD === */
    case "approve-completion":
      approveCompletion(target.dataset.id, true);
      break;
    case "reject-completion":
      approveCompletion(target.dataset.id, false);
      break;
    case "view-photo":
      e.stopPropagation();
      const w = window.open();
      w.document.write(`<img src="${target.dataset.photo}" style="max-width:100%"/>`);
      break;
    case "redeem-reward":
      redeemReward(target.dataset.rewardId);
      break;
    case "edit-reward":
      setView({ editingRewardId: target.dataset.rewardId });
      break;
    case "add-reward":
      setView({ showAddReward: true });
      break;
    case "delete-reward": {
      const id = target.dataset.rewardId;
      const reward = state.rewards.find(r => r.id === id);
      if (!reward) {
        showToast("Couldn't find that item");
        break;
      }
      // Two-tap confirm: first tap arms it, second tap deletes.
      if (view.confirmingDeleteRewardId === id) {
        view.editingRewardId = null;
        view.showAddReward = false;
        view.confirmingDeleteRewardId = null;
        setState({ rewards: state.rewards.filter(r => r.id !== id) });
        showToast("Removed from store", reward.title);
      } else {
        view.confirmingDeleteRewardId = id;
        setView({});
        // auto-disarm after 4s
        setTimeout(() => {
          if (view.confirmingDeleteRewardId === id) {
            view.confirmingDeleteRewardId = null;
            render();
          }
        }, 4000);
      }
      break;
    }
    case "fulfill-redemption":
      fulfillRedemption(target.dataset.id, true);
      break;
    case "deny-redemption":
      fulfillRedemption(target.dataset.id, false);
      break;
    case "open-payout":
      setView({ showPayout: true });
      break;
    case "payout-kid":
      const kid = state.members.find(m => m.id === target.dataset.kidId);
      if (kid && kid.allowance > 0) {
        try { await navigator.clipboard.writeText(kid.allowance.toFixed(2)); } catch {}
        recordPayout(kid.id, kid.allowance, "greenlight");
      }
      break;
    case "open-settings":
      setView({ showSettings: true });
      break;
    case "open-profile":
      e.stopPropagation();
      setView({ showProfile: target.dataset.userId, userMenuOpen: false, showSettings: false });
      break;
    case "remove-profile-photo":
      setState({ members: state.members.map(m => m.id === target.dataset.userId ? { ...m, photoUrl: null } : m) });
      break;
    case "close-modal":
      view.wizardDraft = null;
      view.wizardJustAddedCount = 0;
      setView({ showAdd: false, editingChoreId: null, showRewardsShop: false, showPayout: false, showSettings: false, showProfile: null, showAddReward: false, editingRewardId: null, pendingPhotoChoreId: null });
      break;
    case "export-csv":
      exportCSV();
      break;
    case "export-backup": {
      const json = JSON.stringify(state, null, 2);
      const blob = new Blob([json], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `boyd-chores-backup-${todayISO()}.json`;
      a.click();
      URL.revokeObjectURL(url);
      showToast("Backup downloaded", `boyd-chores-backup-${todayISO()}.json`);
      break;
    }
    case "add-member":
      const newMember = {
        id: uid("m"), name: "New crew member", role: "kid",
        color: PALETTE[state.members.length % PALETTE.length],
        avatar: state.members.length + 1,
        photoUrl: null, allowance: 0, pointsAllTime: 0, streak: 0, lastActive: null,
      };
      setState({ members: [...state.members, newMember] });
      break;
    case "remove-member":
      if (confirm("Remove this member? Their history stays in the ledger.")) {
        setState({ members: state.members.filter(m => m.id !== target.dataset.userId) });
      }
      break;
    case "update-member-color":
      setState({ members: state.members.map(m => m.id === target.dataset.userId ? { ...m, color: target.dataset.color } : m) });
      break;
    case "reroll-avatar":
      setState({ members: state.members.map(m => m.id === target.dataset.userId ? { ...m, avatar: (m.avatar || 0) + 1, photoUrl: null } : m) });
      break;
    case "add-room":
      setState({ rooms: [...state.rooms, { id: uid("r"), name: "New room", emoji: "🏠", health: 1 }] });
      break;
    case "remove-room":
      if (confirm("Remove this room?")) {
        setState({ rooms: state.rooms.filter(r => r.id !== target.dataset.roomId) });
      }
      break;
    case "clear-chores":
      if (confirm(`Delete all ${state.chores.length} chores? This won't affect members, the store, or history.`)) {
        setState({ chores: [], bonusOfferedToday: null });
        showToast("Chores cleared", "Add new ones with the + button");
      }
      break;
    case "clear-history":
      if (confirm(`Delete all ${state.completions.length} completion records and ${state.payouts.length} payouts? Current point and dollar balances stay the same.`)) {
        setState({ completions: [], payouts: [] });
        showToast("History cleared");
      }
      break;
    case "reset-all":
      if (confirm("Wipe everything? This cannot be undone.")) {
        state = { ...DEFAULT_STATE };
        suppressNextRemoteUpdate = true;
        await db.save(state);
        setView({ showSettings: false });
      }
      break;
  }
});

// form submissions
document.addEventListener('submit', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  e.preventDefault();
  const action = target.dataset.action;
  const fd = new FormData(target);

  if (action === "save-chore") {
    const id = target.dataset.choreId;
    const data = {
      title: fd.get('title'),
      roomId: fd.get('roomId'),
      assignee: fd.get('assignee') || null,
      points: +fd.get('points') || 0,
      dollars: +fd.get('dollars') || 0,
      recurrence: fd.get('recurrence'),
      photoRequired: fd.get('photoRequired') === 'on',
    };
    if (id) {
      setState({ chores: state.chores.map(c => c.id === id ? { ...c, ...data } : c) });
      showToast("Chore updated", data.title);
    } else {
      setState({ chores: [{ id: uid("c"), ...data, status: "open", createdAt: nowISO(), nextDue: todayISO() }, ...state.chores] });
      showToast("Chore added", data.title);
    }
    setView({ showAdd: false, editingChoreId: null });
  }

  if (action === "save-reward") {
    const id = target.dataset.rewardId;
    const editing = id ? state.rewards.find(r => r.id === id) : null;
    const data = {
      title: fd.get('title'),
      description: fd.get('description'),
      cost: +fd.get('cost') || 1,
      category: fd.get('category'),
      emoji: fd.get('emoji') || '🎁',
      stock: +fd.get('stock'),
      imageUrl: editing?.imageUrl || null, // preserved separately via upload handler
    };
    if (id) {
      setState({ rewards: state.rewards.map(r => r.id === id ? { ...r, ...data } : r) });
      showToast("Item updated", data.title);
    } else {
      setState({ rewards: [{ id: uid("rw"), ...data }, ...state.rewards] });
      showToast("Added to store", data.title);
    }
    setView({ showAddReward: false, editingRewardId: null });
  }
});

// change events (text inputs in settings, kid mode toggle, file uploads)
// Live input updates (no re-render) for wizard text fields
document.addEventListener('input', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  if (action === "wizard-title-input" && view.wizardDraft) {
    view.wizardDraft.title = target.value;
    // Enable/disable the Next button without full re-render (preserves input focus)
    const nextBtn = document.querySelector('[data-action="wizard-next"]');
    if (nextBtn) {
      if (target.value.trim().length > 0) nextBtn.removeAttribute('disabled');
      else nextBtn.setAttribute('disabled', '');
    }
  }
  if (action === "wizard-points-input" && view.wizardDraft) {
    view.wizardDraft.points = +target.value || 0;
  }
  if (action === "wizard-dollars-input" && view.wizardDraft) {
    view.wizardDraft.dollars = +target.value || 0;
  }
});

document.addEventListener('change', async (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === "update-member") {
    const userId = target.dataset.userId;
    const field = target.dataset.field;
    setState({ members: state.members.map(m => m.id === userId ? { ...m, [field]: target.value } : m) });
  }

  if (action === "update-room") {
    const roomId = target.dataset.roomId;
    const field = target.dataset.field;
    setState({ rooms: state.rooms.map(r => r.id === roomId ? { ...r, [field]: target.value } : r) });
  }

  if (action === "toggle-kid-mode") {
    setState({ kidMode: target.checked });
  }

  if (action === "upload-profile-photo") {
    const file = target.files[0];
    if (!file) return;
    showToast("Uploading photo…");
    try {
      const url = await db.uploadImage(file);
      setState({ members: state.members.map(m => m.id === target.dataset.userId ? { ...m, photoUrl: url } : m) });
      showToast("Profile photo updated");
    } catch (err) {
      showToast("Upload failed", err.message);
    }
  }

  if (action === "upload-chore-photo") {
    const file = target.files[0];
    if (!file) return;
    showToast("Attaching photo…");
    try {
      const url = await db.uploadImage(file);
      completeChore(target.dataset.choreId, url);
    } catch (err) {
      showToast("Upload failed", err.message);
    }
  }

  if (action === "upload-reward-image") {
    const file = target.files[0];
    if (!file) return;
    try {
      const url = await db.uploadImage(file);
      // Stash on the editing reward (or pending new reward staging via DOM)
      const id = view.editingRewardId;
      if (id) {
        setState({ rewards: state.rewards.map(r => r.id === id ? { ...r, imageUrl: url } : r) });
        showToast("Image uploaded");
      } else {
        // for new reward, write to a temp slot rendered immediately
        const preview = document.getElementById('reward-image-preview');
        if (preview) preview.innerHTML = `<img src="${url}"/>`;
        // store on form so submit handler can pick it up
        const form = target.closest('form');
        let hidden = form.querySelector('input[name="imageUrl"]');
        if (!hidden) {
          hidden = document.createElement('input');
          hidden.type = 'hidden';
          hidden.name = 'imageUrl';
          form.appendChild(hidden);
        }
        hidden.value = url;
        // Update the submit handler to read this
      }
    } catch (err) { showToast("Upload failed"); }
  }

  if (action === "import-backup") {
    const file = target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        // Sanity check: must have at least members and chores arrays
        if (!Array.isArray(imported.members) || !Array.isArray(imported.chores)) {
          showToast("Invalid backup file", "Missing members or chores");
          return;
        }
        const memberCount = imported.members.length;
        const choreCount = imported.chores.length;
        const ok = window.confirm(`Restore backup with ${memberCount} members and ${choreCount} chores? This replaces everything currently in the app.`);
        if (!ok) {
          target.value = ""; // reset so same file can be retried
          return;
        }
        state = imported;
        suppressNextRemoteUpdate = true;
        await db.save(state);
        setView({ showSettings: false });
        showToast("Backup restored", `${memberCount} members · ${choreCount} chores`);
      } catch (err) {
        showToast("Couldn't read file", err.message);
      } finally {
        target.value = "";
      }
    };
    reader.readAsText(file);
  }
});

/* ============================================================
   BOOT
   ============================================================ */
(async () => {
  // Show a brief loader so the screen isn't blank while Firestore loads
  document.getElementById('app').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;color:#0E2A47;font-family:'Inter',sans-serif">
      <img src="${document.querySelector('link[rel=icon]').href}" alt="" style="width:48px;height:48px"/>
      <div style="font-family:'Fraunces',serif;font-size:20px;font-weight:800">Loading the family ledger…</div>
      <div style="font-size:12px;opacity:0.6">Connecting to Firestore</div>
    </div>`;

  let loaded = null;
  try {
    loaded = await db.load();
  } catch (e) {
    console.error("Initial load failed:", e);
    showToast("Couldn't connect to Firestore", "Check your connection");
  }

  state = loaded || JSON.parse(JSON.stringify(DEFAULT_STATE));

  // refresh daily bonus
  if (!state.bonusOfferedToday || state.bonusOfferedToday.date !== todayISO()) {
    const open = state.chores.filter(c => c.status === "open");
    if (open.length) {
      const pick = open[Math.floor(Math.random() * open.length)];
      state.bonusOfferedToday = { date: todayISO(), choreId: pick.id, multiplier: 2 };
    }
  }

  // gentle decay of room health (capped)
  state.rooms = state.rooms.map(r => ({ ...r, health: Math.max(0.1, r.health) }));

  // First save establishes the doc if it didn't exist
  try { await db.save(state); } catch (e) { /* will retry on next change */ }
  render();

  // Live sync: when another family member changes something, refresh the local state.
  // We suppress the update right after our own writes so we don't clobber typing in progress.
  db.subscribe((remoteState) => {
    if (suppressNextRemoteUpdate) {
      suppressNextRemoteUpdate = false;
      return;
    }
    // Don't overwrite if the remote is identical (avoids unnecessary re-renders)
    if (JSON.stringify(remoteState) === JSON.stringify(state)) return;
    state = remoteState;
    render();
  });
})();
</script>
